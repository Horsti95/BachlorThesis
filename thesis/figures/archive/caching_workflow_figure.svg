<svg viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="cacheGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.4" />
    </linearGradient>
    
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0.3" />
    </linearGradient>
    
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="700" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="18" font-weight="bold">
    Intelligent Caching Workflow with Configuration Fingerprinting
  </text>
  
  <!-- Experiment Request -->
  <rect x="50" y="80" width="160" height="60" rx="8" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
  <text x="130" y="105" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    ML Experiment Request
  </text>
  <text x="130" y="120" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="10">
    Model + Data + Config
  </text>
  
  <!-- Configuration Fingerprinting -->
  <rect x="250" y="80" width="160" height="60" rx="8" fill="url(#processGrad)" stroke="#3b82f6" stroke-width="2"/>
  <text x="330" y="100" text-anchor="middle" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    Configuration
  </text>
  <text x="330" y="115" text-anchor="middle" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    Fingerprinting
  </text>
  <text x="330" y="130" text-anchor="middle" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="9">
    SHA-256 Hash
  </text>
  
  <!-- Hash Example -->
  <rect x="450" y="80" width="200" height="60" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="550" y="100" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="10" font-weight="bold">
    Fingerprint Hash
  </text>
  <text x="550" y="115" text-anchor="middle" fill="#6b7280" font-family="monospace, Arial" font-size="8">
    a3f4b7c9e2d1...
  </text>
  <text x="550" y="128" text-anchor="middle" fill="#6b7280" font-family="monospace, Arial" font-size="8">
    8f6e3d2c1b9a...
  </text>
  
  <!-- Cache Lookup Decision -->
  <rect x="300" y="180" width="200" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="205" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    Cache Lookup
  </text>
  <text x="400" y="220" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="10">
    Check if fingerprint exists
  </text>
  
  <!-- Cache Hit Path -->
  <rect x="80" y="280" width="180" height="80" rx="8" fill="url(#cacheGrad)" stroke="#10b981" stroke-width="2"/>
  <text x="170" y="305" text-anchor="middle" fill="#047857" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    Cache HIT
  </text>
  <text x="170" y="325" text-anchor="middle" fill="#047857" font-family="Arial, sans-serif" font-size="10">
    Retrieve cached results
  </text>
  <text x="170" y="340" text-anchor="middle" fill="#047857" font-family="Arial, sans-serif" font-size="10">
    Validate integrity
  </text>
  <text x="170" y="352" text-anchor="middle" fill="#047857" font-family="Arial, sans-serif" font-size="9">
    Time saved: ~80%
  </text>
  
  <!-- Cache Miss Path -->
  <rect x="540" y="280" width="180" height="80" rx="8" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
  <text x="630" y="305" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    Cache MISS
  </text>
  <text x="630" y="325" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="10">
    Execute experiment
  </text>
  <text x="630" y="340" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="10">
    Store results in cache
  </text>
  <text x="630" y="352" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="9">
    Full computation
  </text>
  
  <!-- ML Prediction Models -->
  <rect x="280" y="400" width="240" height="100" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="400" y="425" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    ML-Aided Cache Prediction
  </text>
  
  <!-- LSTM Model -->
  <rect x="290" y="440" width="100" height="25" rx="5" fill="#ddd6fe" stroke="#8b5cf6"/>
  <text x="340" y="455" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-size="10">
    LSTM Model
  </text>
  
  <!-- CatBoost Model -->
  <rect x="410" y="440" width="100" height="25" rx="5" fill="#ddd6fe" stroke="#8b5cf6"/>
  <text x="460" y="455" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-size="10">
    CatBoost Model
  </text>
  
  <text x="400" y="480" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-size="10">
    Predicts cache access patterns & file-level access
  </text>
  
  <!-- Results -->
  <rect x="150" y="550" width="500" height="80" rx="8" fill="#f3f4f6" stroke="#374151" stroke-width="2"/>
  <text x="400" y="575" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    Optimized ML Experiment Results
  </text>
  <text x="400" y="595" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">
    With dependency tracking and automatic cache invalidation
  </text>
  <text x="400" y="610" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">
    Scientific rigor maintained through fingerprint verification
  </text>
  
  <!-- Arrows -->
  <line x1="215" y1="110" x2="245" y2="110" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="415" y1="110" x2="445" y2="110" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="245" x2="400" y2="275" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Cache hit/miss arrows -->
  <line x1="350" y1="320" x2="265" y2="320" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="320" x2="535" y2="320" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Results arrows -->
  <line x1="170" y1="365" x2="300" y2="545" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="630" y1="365" x2="500" y2="545" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- ML prediction connection -->
  <line x1="400" y1="365" x2="400" y2="395" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  
  <!-- Labels for decision paths -->
  <text x="320" y="310" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="10" font-weight="bold">
    Found
  </text>
  <text x="480" y="310" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="10" font-weight="bold">
    Not Found
  </text>
  
  <!-- Cache invalidation note -->
  <rect x="50" y="650" width="700" height="30" rx="5" fill="#fef2f2" stroke="#ef4444"/>
  <text x="400" y="668" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="11" font-weight="bold">
    Automatic Cache Invalidation: When code, data, or configuration changes detected
  </text>
  
</svg>